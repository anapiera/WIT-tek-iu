<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEK | Interactive Experience</title>

<link rel="stylesheet" href="styles.css">

<!-- Chart.js for graphs -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background:#0a0f1c;
    color:white;
    font-family: 'Inter', sans-serif;
}

/* HERO */
.dashboard-hero {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:100px 8%;
    gap:50px;
}

.hero-text h1 {
    font-size:3rem;
    margin-bottom:15px;
}

.hero-text p {
    opacity:0.7;
    max-width:400px;
}

/* TRIDENT */
.trident {
    width:350px;
    opacity:0.9;
    filter:drop-shadow(0 0 40px #3b82f6);
}

/* STAT CARDS */
.stats {
    display:flex;
    gap:20px;
    margin-top:20px;
}

.stat-card {
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:12px;
    text-align:center;
    min-width:120px;
}

.stat-card h2 {
    color:#7ecbff;
}

/* GRID */
.dashboard-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
    padding:50px 8%;
}

/* GLASS CARDS */
.card {
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:25px;
    border-radius:15px;
}

/* TITLES */
.card h3 {
    margin-bottom:15px;
    color:#7ecbff;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="dashboard-hero">

    <div class="hero-text">
        <h1>TEK Intelligence Dashboard</h1>
        <p>A data-driven look at TEK within Indiana University.</p>

        <div class="stats">
            <div class="stat-card">
                <h2>8</h2>
                <p>Members</p>
            </div>
            <div class="stat-card">
                <h2>37</h2>
                <p>Pledges</p>
            </div>
            <div class="stat-card">
                <h2>5+</h2>
                <p>Projects</p>
            </div>
            <div class="stat-card">
                <h2>100+</h2>
                <p>Hours</p>
            </div>
        </div>
    </div>

    <!-- IU TRIDENT IMAGE -->
    <img src="trident.png" class="trident">

</section>

<!-- DASHBOARD -->
<section class="dashboard-grid">

    <!-- MAJOR DISTRIBUTION -->
    <div class="card">
        <h3>Major Distribution</h3>
        <canvas id="majorChart"></canvas>
    </div>

    <!-- GPA -->
    <div class="card">
        <h3>GPA Distribution</h3>
        <canvas id="gpaChart"></canvas>
    </div>

    <!-- IU ECOSYSTEM -->
    <div class="card">
        <h3>IU Ecosystem</h3>
        <canvas id="schoolChart"></canvas>
    </div>

    <!-- PROJECT GROWTH -->
    <div class="card">
        <h3>Project Growth</h3>
        <canvas id="projectChart"></canvas>
    </div>

</section>

<script>

// MAJORS
new Chart(document.getElementById('majorChart'), {
    type: 'doughnut',
    data: {
        labels: ['Data Science','CS','Finance','Informatics'],
        datasets: [{
            data: [40,25,20,15],
        }]
    }
});

// GPA
new Chart(document.getElementById('gpaChart'), {
    type: 'bar',
    data: {
        labels: ['3.0-3.3','3.3-3.6','3.6-3.8','3.8+'],
        datasets: [{
            data: [2,4,6,8],
        }]
    }
});

// SCHOOLS
new Chart(document.getElementById('schoolChart'), {
    type: 'pie',
    data: {
        labels: ['Luddy','Kelley','Other'],
        datasets: [{
            data: [60,30,10],
        }]
    }
});

// PROJECTS
new Chart(document.getElementById('projectChart'), {
    type: 'line',
    data: {
        labels: ['2024','2025','2026'],
        datasets: [{
            data: [2,5,9],
        }]
    }
});

</script>

</body>
</html>
