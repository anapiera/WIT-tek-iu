<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="btn2.jpg">
<title>TEK IU</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

body {
    background:#0a1f44;
    color:white;
    padding-top:90px;
}

/* NAVBAR (UNCHANGED) */
nav {
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 60px;
    background:rgba(10,31,68,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    z-index:1000;
}

.nav-logo img {
    height:70px;
}

.nav-links {
    display:flex;
    gap:30px;
}

.nav-links a {
    color:white;
    text-decoration:none;
    position:relative;
}

.nav-links a::after {
    content:'';
    position:absolute;
    bottom:-6px;
    left:0;
    width:0%;
    height:2px;
    background:white;
    transition:.3s;
}

.nav-links a:hover::after {
    width:100%;
}

.connect-btn {
    border:1.5px solid white;
    padding:8px 18px;
    border-radius:6px;
}

.connect-btn:hover {
    background:white;
    color:#0a1f44;
}

/* HERO (UNCHANGED) */
.hero {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    background:url("logo.jpg") center/cover no-repeat;
}

.hero::before {
    content:'';
    position:absolute;
    inset:0;
    background:rgba(10,31,68,0.65);
}

.hero-content {
    position:relative;
    z-index:2;
}

.hero h1 {
    font-size:3.8rem;
}

.hero-btn {
    margin-top:30px;
    padding:14px 34px;
    border:2px solid white;
    background:none;
    color:white;
}

/* =========================
   CIRCUIT BOOT OVERLAY
========================= */

#circuit-overlay {
    position:absolute;
    inset:0;
    z-index:5;
    overflow:hidden;
    background:#071634;
}

/* BASE CIRCUIT IMAGE */
.circuit-bg {
    position:absolute;
    inset:0;
    background:url("circuit.png") center/cover no-repeat;
    opacity:0.15;
    filter:blur(2px);
    transition:all 1.5s ease;
}

/* GLOW LAYER */
.circuit-glow {
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(59,130,246,0.5), transparent 60%);
    opacity:0;
    animation:glowPulse 2.5s ease forwards;
}

/* ENERGY SWEEP */
.energy {
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, transparent, rgba(59,130,246,0.4), transparent);
    transform:translateX(-100%);
    animation:flow 2s ease forwards;
}

/* TEK TEXT */
.boot-text {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:3rem;
    letter-spacing:4px;
    opacity:0;
    animation:textReveal 1s ease forwards;
    animation-delay:2s;
}

/* FADE OUT */
.fade-out {
    animation:fadeOut 1.5s ease forwards;
    animation-delay:3s;
}

/* ANIMATIONS */

@keyframes glowPulse {
    0% { opacity:0; }
    50% { opacity:1; }
    100% { opacity:0.6; }
}

@keyframes flow {
    0% { transform:translateX(-100%); }
    100% { transform:translateX(100%); }
}

@keyframes textReveal {
    to { opacity:1; }
}

@keyframes fadeOut {
    to { opacity:0; visibility:hidden; }
}

/* =========================
   RUSH (UNCHANGED)
========================= */
.rush-section {
    padding:140px 40px;
    text-align:center;
}

.rush-line {
    height:2px;
    background:linear-gradient(to right, #3b82f6, transparent);
    max-width:1000px;
    margin:auto;
}

.rush-items {
    display:flex;
    justify-content:space-between;
    max-width:1000px;
    margin:auto;
}

.rush-dot {
    width:14px;
    height:14px;
    background:#3b82f6;
    border-radius:50%;
}

footer {
    padding:30px;
    text-align:center;
}

</style>
</head>

<body>

<nav>
<div class="nav-logo">
    <a href="index.html"><img src="btn.png"></a>
</div>

<div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="members.html">Members</a>
    <a href="activities.html">Activities</a>
    <a href="connect.html" class="connect-btn">Connect</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">

<!-- CIRCUIT ANIMATION -->
<div id="circuit-overlay" class="fade-out">
    <div class="circuit-bg"></div>
    <div class="circuit-glow"></div>
    <div class="energy"></div>
    <div class="boot-text">TEK</div>
</div>

<div class="hero-content">
<h1>Tau Epsilon Kappa</h1>
<p>INDIANA UNIVERSITY</p>
<div class="est">EST. 2026</div>

<a href="about.html">
<button class="hero-btn">Explore TEK</button>
</a>
</div>

</section>

<!-- RUSH -->
<section class="rush-section">
<h2>Spring 2026 Rush Timeline</h2>
<div class="rush-line"></div>
<div class="rush-items">
<div><div class="rush-dot"></div><h4>March 2</h4></div>
<div><div class="rush-dot"></div><h4>March 4–6</h4></div>
<div><div class="rush-dot"></div><h4>March 7</h4></div>
<div><div class="rush-dot"></div><h4>March 9–11</h4></div>
<div><div class="rush-dot"></div><h4>After</h4></div>
</div>
</section>

<footer>
© 2026 Tau Epsilon Kappa — Indiana University
</footer>

</body>
</html>
