<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEK | Interactive Experience</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================
   GLOBAL
========================= */
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background:#050a14;
    color:white;
}

/* =========================
   LAYOUT
========================= */
.dashboard {
    display:flex;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
    width:230px;
    background:linear-gradient(180deg,#0a1326,#060c18);
    padding:30px 20px;
    height:100vh;
    position:fixed;
}

.sidebar h2 {
    color:#7ecbff;
    margin-bottom:30px;
}

.sidebar a {
    display:block;
    margin:15px 0;
    color:#9fb3c8;
    text-decoration:none;
    transition:.2s;
}

.sidebar a:hover {
    color:white;
}

/* =========================
   MAIN
========================= */
.main {
    margin-left:230px;
    padding:40px;
    width:100%;
}

/* =========================
   HERO / HEADER
========================= */
.top-bar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.top-bar h1 {
    font-size:2.2rem;
}

.metrics {
    display:flex;
    gap:20px;
}

.metric {
    background:rgba(255,255,255,0.05);
    padding:15px 20px;
    border-radius:10px;
    text-align:center;
    min-width:120px;
    backdrop-filter:blur(10px);
}

.metric h2 {
    color:#7ecbff;
    margin:0;
}

/* =========================
   GRID
========================= */
.grid {
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
}

.grid-bottom {
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
}

/* =========================
   CARDS
========================= */
.card {
    background:rgba(255,255,255,0.04);
    border-radius:14px;
    padding:20px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 25px rgba(0,120,255,0.05);
}

.card h3 {
    margin-bottom:15px;
    color:#7ecbff;
}

/* =========================
   MAP / TRIDENT
========================= */
.visual {
    height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.visual img {
    width:250px;
    opacity:0.85;
    filter:drop-shadow(0 0 40px #3b82f6);
}

/* =========================
   CHART FIX
========================= */
canvas {
    max-height:220px;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>TEK</h2>

    <a href="#">Overview</a>
    <a href="#">Members</a>
    <a href="#">Projects</a>
    <a href="#">Impact</a>
    <a href="#">Network</a>
    <a href="#">Insights</a>

    <br><br>
    <a href="index.html">← Back to Site</a>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP -->
    <div class="top-bar">
        <h1>TEK Intelligence Dashboard</h1>

        <div class="metrics">
            <div class="metric">
                <h2>8</h2>
                <p>Members</p>
            </div>
            <div class="metric">
                <h2>37</h2>
                <p>Pledges</p>
            </div>
            <div class="metric">
                <h2>6</h2>
                <p>Projects</p>
            </div>
            <div class="metric">
                <h2>120+</h2>
                <p>Hours</p>
            </div>
        </div>
    </div>

    <!-- TOP GRID -->
    <div class="grid">

        <!-- MAIN CHART -->
        <div class="card">
            <h3>Project Growth</h3>
            <canvas id="growthChart"></canvas>
        </div>

        <!-- TRIDENT VISUAL -->
        <div class="card visual">
            <img src="trident.png">
        </div>

    </div>

    <!-- BOTTOM GRID -->
    <div class="grid-bottom">

        <div class="card">
            <h3>Major Distribution</h3>
            <canvas id="majorChart"></canvas>
        </div>

        <div class="card">
            <h3>GPA Distribution</h3>
            <canvas id="gpaChart"></canvas>
        </div>

        <div class="card">
            <h3>IU Schools</h3>
            <canvas id="schoolChart"></canvas>
        </div>

    </div>

</div>
</div>

<script>

/* =========================
   CHART STYLE (GLOBAL)
========================= */
Chart.defaults.color = "#9fb3c8";
Chart.defaults.borderColor = "rgba(255,255,255,0.1)";

/* PROJECT GROWTH */
new Chart(document.getElementById('growthChart'), {
    type: 'line',
    data: {
        labels: ['2024','2025','2026'],
        datasets: [{
            data: [2,5,9],
            borderColor: '#7ecbff',
            backgroundColor: 'rgba(126,203,255,0.1)',
            fill:true,
            tension:0.4
        }]
    }
});

/* MAJORS */
new Chart(document.getElementById('majorChart'), {
    type: 'doughnut',
    data: {
        labels: ['Data Science','CS','Finance','Informatics'],
        datasets: [{
            data: [40,25,20,15],
            backgroundColor: [
                '#7ecbff','#3b82f6','#1d4ed8','#0ea5e9'
            ]
        }]
    }
});

/* GPA */
new Chart(document.getElementById('gpaChart'), {
    type: 'bar',
    data: {
        labels: ['3.0-3.3','3.3-3.6','3.6-3.8','3.8+'],
        datasets: [{
            data: [2,4,6,8],
            backgroundColor:'#7ecbff'
        }]
    }
});

/* SCHOOLS */
new Chart(document.getElementById('schoolChart'), {
    type: 'pie',
    data: {
        labels: ['Luddy','Kelley','Other'],
        datasets: [{
            data: [60,30,10],
            backgroundColor: [
                '#7ecbff','#3b82f6','#1e293b'
            ]
        }]
    }
});

</script>

</body>
</html>
